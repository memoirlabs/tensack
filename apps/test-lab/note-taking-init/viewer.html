<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sixpack note-taking speed report</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --line: #2a2a2a;
        --ink: #f4f4f4;
        --muted: #a3a3a3;
        --accent: #cdfc55;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(42px, 8vw, 88px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      code,
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 32px;
      }

      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 18px;
      }

      .label {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .value {
        display: block;
        margin-top: 8px;
        color: var(--accent);
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1;
      }

      .table {
        display: grid;
        margin-top: 32px;
        border-top: 1px solid var(--line);
      }

      .row {
        display: grid;
        grid-template-columns: minmax(180px, 0.4fr) minmax(0, 1fr);
        gap: 16px;
        border-bottom: 1px solid var(--line);
        padding: 14px 0;
      }

      .row strong {
        color: var(--accent);
      }

      .empty {
        margin-top: 32px;
        border: 1px solid var(--line);
        padding: 18px;
        background: var(--panel);
      }

      @media (max-width: 720px) {
        .grid,
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="mono">apps/test-lab/note-taking-init</p>
      <h1>Note update speed report.</h1>
      <p>
        This page is generated by the test-lab note-taking example. It reports
        real generated-SDK edit calls against a temporary sixpack database.
      </p>

      <section id="report"></section>
    </main>

    <script>
      window.__SIXPACK_NOTE_REPORT__ = null;

      const report = window.__SIXPACK_NOTE_REPORT__;
      const root = document.getElementById("report");

      if (!report) {
        root.innerHTML = `
          <div class="empty">
            <strong>No report embedded.</strong>
            <p>Run <code>cargo run -p note-taking-init -- --reset --speed-updates 1000</code>
            and open the generated <code>report.html</code> file.</p>
          </div>
        `;
      } else {
        const compaction = report.compaction
          ? `
            <div class="row">
              <strong>compaction</strong>
              <span>
                <code>${report.compaction.table}/${report.compaction.chunk_name}</code>
                kept ${report.compaction.live_rows} live row(s),
                ${report.compaction.bytes_before} -> ${report.compaction.bytes_after} bytes
              </span>
            </div>
            <div class="row">
              <strong>chunks</strong>
              <span>${report.compaction.chunks_before} -> ${report.compaction.chunks_after}</span>
            </div>
          `
          : "";
        root.innerHTML = `
          <div class="grid">
            <div class="card">
              <span class="label">updates</span>
              <span class="value">${report.updates}</span>
            </div>
            <div class="card">
              <span class="label">elapsed</span>
              <span class="value">${report.elapsed_ms.toFixed(3)} ms</span>
            </div>
            <div class="card">
              <span class="label">per update</span>
              <span class="value">${report.micros_per_update.toFixed(3)} us</span>
            </div>
          </div>

          <div class="table">
            <div class="row">
              <strong>final title</strong>
              <span>${report.final_title}</span>
            </div>
            <div class="row">
              <strong>final updated_at</strong>
              <span>${report.final_updated_at}</span>
            </div>
            ${compaction}
            <div class="row">
              <strong>canonical data</strong>
              <span><code>${report.layout.canonical_data}</code></span>
            </div>
            <div class="row">
              <strong>current engine state</strong>
              <span><code>${report.layout.current_engine_state}</code></span>
            </div>
            <div class="row">
              <strong>target engine state</strong>
              <span><code>${report.layout.target_engine_state}</code></span>
            </div>
          </div>
        `;
      }
    </script>
  </body>
</html>
